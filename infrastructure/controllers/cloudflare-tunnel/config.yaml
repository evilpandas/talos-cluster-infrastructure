---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare-tunnel
data:
  config.yaml: |
    # Tunnel ID from credentials
    tunnel: 298df0fd-2215-4d2d-b5b0-9c54b0f06ae1
    credentials-file: /etc/cloudflared/creds/credentials.json

    # Metrics for monitoring
    metrics: 0.0.0.0:2000

    # Ingress rules - route traffic to ingress-nginx
    # These rules take precedence over any dashboard configuration
    ingress:
      - hostname: dlp.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: home.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: status.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: grafana.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: prometheus.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - service: http_status:404
