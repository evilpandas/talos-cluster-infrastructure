---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare-tunnel
data:
  config.yaml: |
    # TODO: Replace <your-tunnel-id> with actual tunnel ID
    # Get this by running: cloudflared tunnel create evilpandas-talos
    tunnel: <your-tunnel-id>
    credentials-file: /etc/cloudflared/creds/credentials.json

    # Metrics for monitoring
    metrics: 0.0.0.0:2000

    # No TLS verification for internal services (optional)
    # no-tls-verify: true

    # Ingress rules - route traffic to ingress-nginx
    ingress:
      # Evil Downloader
      - hostname: dlp.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          noTLSVerify: true

      # Homepage
      - hostname: home.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          noTLSVerify: true

      # Uptime Kuma
      - hostname: status.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          noTLSVerify: true

      # Grafana (monitoring)
      - hostname: grafana.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          noTLSVerify: true

      # Prometheus (monitoring)
      - hostname: prometheus.evilpandas.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          noTLSVerify: true

      # Wildcard catch-all - returns 404
      - service: http_status:404
