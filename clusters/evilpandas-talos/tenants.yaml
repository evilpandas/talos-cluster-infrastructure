---
# This file will contain GitRepository and Kustomization resources
# for each tenant application (evil-downloader, homepage, uptime-kuma, etc)
#
# Flux will automatically apply tenant configurations from the tenants/ directory
# when you add them there.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenants
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./tenants
  prune: false  # Don't auto-delete tenant resources
  dependsOn:
    - name: infrastructure-controllers
    - name: infrastructure-monitoring
